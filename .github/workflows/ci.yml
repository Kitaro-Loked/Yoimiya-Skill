name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Lint with flake8
      run: |
        # 检查语法错误和未定义变量
        flake8 scripts/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # 检查代码风格（仅警告，不阻断）
        flake8 scripts/ tests/ --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics
    
    - name: Check code formatting with black
      run: |
        black --check --diff scripts/ tests/ || true
    
    - name: Check import sorting with isort
      run: |
        isort --check-only --diff scripts/ tests/ || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # openclaw-sdk 是运行时依赖，CI 中通过 mock 处理
        # pip install -r requirements.txt
    
    - name: Run tests
      run: |
        python -m unittest discover -s tests -v
    
    - name: Check JSON validity
      run: |
        python -c "import json; json.load(open('references/config.json', encoding='utf-8')); print('config.json OK')"
        python -c "import json; json.load(open('references/prompts.json', encoding='utf-8')); print('prompts.json OK')"

  type-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy types-requests
    
    - name: Type check with mypy
      run: |
        mypy scripts/ --ignore-missing-imports --show-error-codes || true
